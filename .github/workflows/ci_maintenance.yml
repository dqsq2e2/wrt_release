name: CI Maintenance

on:
  schedule:
    - cron: "23 20 * * 0"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: ci-maintenance
  cancel-in-progress: false

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    steps:
      - name: Prune Old Dependency Caches
        run: |
          cutoff=$(date -u -d '14 days ago' +%s)
          gh cache list --limit 10000 --json key,lastAccessedAt | jq -r '.[] | [.key, .lastAccessedAt] | @tsv' | \
          while IFS=$'\t' read -r key last_accessed; do
            [[ "$key" == upstream-watch-* ]] && continue
            cache_time=$(date -u -d "$last_accessed" +%s)
            if (( cache_time < cutoff )); then
              echo "Deleting cache: $key"
              gh cache delete "$key" || true
            fi
          done

      - name: Keep Recent Upstream Markers
        run: |
          for model in MEDIATEK-WIFI-YES MEDIATEK-WIFI-NO clx_s20p_immwrt jdcloud_ax6000_immwrt; do
            gh cache list --key "upstream-watch-$model-" --limit 100 --json key,createdAt | \
              jq -r 'sort_by(.createdAt) | reverse | .[5:] | .[].key' | \
              while read -r key; do
                [[ -n "$key" ]] && gh cache delete "$key" || true
              done
          done

      - name: Prune Old Workflow Runs
        run: |
          cutoff=$(date -u -d '3 days ago' +%s)
          gh run list --limit 500 --json databaseId,createdAt,status | jq -r '.[] | select(.status == "completed") | [.databaseId, .createdAt] | @tsv' | \
          while IFS=$'\t' read -r run_id created_at; do
            run_time=$(date -u -d "$created_at" +%s)
            if (( run_time < cutoff )); then
              echo "Deleting workflow run: $run_id"
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/actions/runs/$run_id" || true
            fi
          done

      - name: Keep Recent Monitored Releases
        run: |
          for model in MEDIATEK-WIFI-YES MEDIATEK-WIFI-NO clx_s20p_immwrt jdcloud_ax6000_immwrt; do
            gh release list --limit 100 --json tagName,publishedAt | \
              jq -r --arg suffix "_$model" 'sort_by(.publishedAt) | reverse | map(select(.tagName | endswith($suffix))) | .[2:] | .[].tagName' | \
              while read -r tag; do
                if [[ -n "$tag" ]]; then
                  echo "Deleting release: $tag"
                  gh release delete "$tag" --cleanup-tag --yes || true
                fi
              done
          done
