name: Build WRT
run-name: Build - ${{ inputs.model }}

on:
  workflow_dispatch:
    inputs:
      model:
        required: true
        description: Device Model
        type: choice
        default: jdcloud_ipq60xx_immwrt
        options:
          - aliyun_ap8220_immwrt
          - aliyun_ap8220_libwrt
          - cmcc_rax3000m_immwrt
          - clx_s20p_immwrt
          - gemtek_w1701k_immwrt
          - jdcloud_ax6000_immwrt
          - jdcloud_ipq60xx_immwrt
          - jdcloud_ipq60xx_libwrt
          - link_nn6000v2_immwrt
          - linksys_mx4x00_immwrt
          - MEDIATEK-WIFI-NO
          - MEDIATEK-WIFI-YES
          - qihoo_360v6_immwrt
          - redmi_ax5_immwrt
          - redmi_ax6_immwrt
          - redmi_ax6_libwrt
          - redmi_ax6000_immwrt21
          - zn_m2_immwrt
          - zn_m2_libwrt
          - x64_immwrt
      add_fragments:
        required: false
        description: Add config fragments, comma separated
        default: ""
      remove_fragments:
        required: false
        description: Remove default config fragments, comma separated
        default: ""

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  CCACHE_MAXSIZE: 2G
  CCACHE_COMPRESS: "true"

permissions:
  actions: write
  contents: read

concurrency:
  group: wrt-${{ inputs.model }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/.ghcup || true
          sudo rm -rf /usr/share/swift || true
          sudo rm -rf /usr/local/share/powershell || true
          sudo rm -rf /opt/az || true
          sudo rm -rf /opt/microsoft || true
          sudo rm -rf "${AGENT_TOOLSDIRECTORY:-/opt/hostedtoolcache}" || true
          docker system prune -af --volumes || true
          sudo -E apt-get autoremove --purge -y || true
          sudo -E apt-get clean || true
          df -hT

      - name: Build System Setup
        run: |
          sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
          sudo -E apt -yqq install dos2unix
          sudo -E apt -yqq install libfuse-dev
          sudo -E apt -yqq autoremove --purge
          sudo -E apt -yqq autoclean
          sudo -E apt -yqq clean
          sudo -E systemctl daemon-reload

      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set Build Date and Timezone
        env:
          RAW_ADD_CONFIG_FRAGMENTS: ${{ inputs.add_fragments }}
          RAW_REMOVE_CONFIG_FRAGMENTS: ${{ inputs.remove_fragments }}
        run: |
          sudo -E timedatectl set-timezone "Asia/Shanghai"
          export BUILD_DATE=$(TZ=UTC-8 date +"%y.%m.%d_%H.%M.%S")
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          sanitize_cache_key_part() { printf '%s' "$1" | tr -c 'A-Za-z0-9_.-' '_'; }
          echo "ADD_CONFIG_FRAGMENTS_KEY=$(sanitize_cache_key_part "$RAW_ADD_CONFIG_FRAGMENTS")" >> $GITHUB_ENV
          echo "REMOVE_CONFIG_FRAGMENTS_KEY=$(sanitize_cache_key_part "$RAW_REMOVE_CONFIG_FRAGMENTS")" >> $GITHUB_ENV

      - name: Pre Clone
        run: ./wrt_core/pre_clone_action.sh ${{ inputs.model }}

      - name: Cache Dependencies
        uses: actions/cache@v6.1.0
        with:
          path: |
            ./action_build/.ccache
            ./action_build/staging_dir/host*
            ./action_build/staging_dir/tool*
          key: ${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}-${{ env.ADD_CONFIG_FRAGMENTS_KEY }}-${{ env.REMOVE_CONFIG_FRAGMENTS_KEY }}-${{ env.BUILD_DATE }}
          restore-keys: |
            ${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}-${{ env.ADD_CONFIG_FRAGMENTS_KEY }}-${{ env.REMOVE_CONFIG_FRAGMENTS_KEY }}-
            ${{ matrix.os }}-${{ inputs.model }}-${{ hashFiles('**/repo_flag') }}-
            ${{ matrix.os }}-${{ inputs.model }}-

      - name: Refresh the cache
        run: |
          if [ -d "./action_build/staging_dir" ]; then
            find "./action_build/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r dir; do
                find "$dir" -type f -exec touch {} +
            done
          fi

      - name: Machine Information (Pre-build)
        run: |
          echo "=============== Pre-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "=================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "=================================================="
          echo "[Memory]"
          free -h
          echo "=================================================="
          echo "[Disk]"
          df -hT
          echo "--------------------------------------------------"
          df -hi
          echo "=================================================="
          echo "[Workspace]"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          du -sh "${GITHUB_WORKSPACE}" 2>/dev/null || true
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "=================================================="

      - name: Build Firmware
        env:
          ADD_CONFIG_FRAGMENTS: ${{ inputs.add_fragments }}
          REMOVE_CONFIG_FRAGMENTS: ${{ inputs.remove_fragments }}
        run: |
          available_gb=$(df --output=avail -BG . | tail -n 1 | tr -dc '0-9')
          required_gb=20
          if [[ "${{ inputs.model }}" == "MEDIATEK-WIFI-YES" ]]; then
            required_gb=35
          fi
          if (( available_gb < required_gb )); then
            echo "Insufficient disk space: ${available_gb}G available, ${required_gb}G required" >&2
            exit 1
          fi
          ./build.sh ${{ inputs.model }}

      - name: Delete Old Cache
        run: |
          # 获取缓存列表并删除
          gh cache list --key ${{ matrix.os }}-${{ inputs.model }}- --json key --jq '.[] | .key' | while read -r key; do
            gh cache delete "$key"
          done
          # 输出缓存状态
          echo "========cache status========"
          echo "ccache: $(du -sh ./action_build/.ccache | cut -f 1)"
          echo "staging: $(du -sh ./action_build/staging_dir | cut -f 1)"

      - name: Machine Information (Post-build)
        run: |
          echo "=============== Post-build Snapshot ==============="
          echo "Time: $(date '+%F %T %Z')"
          echo "Runner: ${RUNNER_NAME} (${RUNNER_OS}/${RUNNER_ARCH})"
          echo "Kernel: $(uname -r)"
          echo "Uptime: $(uptime -p)"
          echo "===================================================="
          echo "[CPU]"
          lscpu | grep -E "Model name|Architecture|CPU\\(s\\)|Thread\\(s\\) per core|Core\\(s\\) per socket|CPU max MHz"
          echo "===================================================="
          echo "[Memory]"
          free -h
          echo "===================================================="
          echo "[Disk]"
          df -hT
          echo "----------------------------------------------------"
          df -hi
          echo "===================================================="
          echo "[Build Outputs]"
          du -sh ./action_build/.ccache 2>/dev/null || true
          du -sh ./action_build/staging_dir 2>/dev/null || true
          du -sh ./firmware 2>/dev/null || true
          echo "Firmware file count: $(ls -1 ./firmware 2>/dev/null | wc -l)"
          echo "===================================================="

      - name: Upload Firmware
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ env.BUILD_DATE }}_${{ inputs.model }}
          path: ./firmware/*.*
          retention-days: 3
          if-no-files-found: error

      - name: Cleanup Target Build
        if: ${{ always() }}
        run: |
          if [ -f ./action_build/Makefile ]; then
            make -C ./action_build clean || true
          fi
          rm -rf ./action_build/build_dir ./action_build/staging_dir/target-* ./action_build/bin ./firmware
          df -hT
